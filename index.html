<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Fraction Calculator">
    <meta name="theme-color" content="#100f0c">
    <link rel="apple-touch-icon" href="/fractions/apple-touch-icon.png">
    <title>Fraction Calculator</title>
    <script type="module" crossorigin src="/fractions/assets/index-D5Gyu1Cm.js"></script>
    <link rel="stylesheet" crossorigin href="/fractions/assets/index-CHPMWR8P.css">
  <link rel="manifest" href="/fractions/manifest.webmanifest"><script id="vite-plugin-pwa:register-sw" src="/fractions/registerSW.js"></script></head>
  <body>

    <header>
      <h1>Fraction&thinsp;&middot;&thinsp;Calculator</h1>
    </header>

    <div id="calculator" tabindex="-1">

      <div class="row">
        <div class="output-wrap">
          <div id="output"></div>
          <div id="backspace">⌫</div>
        </div>
      </div>
      <div id="decimal" style="grid-column: 1 / -1;"></div>
      <div class="row">
        <div class="btn btn-default">(</div>
        <div class="btn btn-default">)</div>
        <div class="btn btn-success symbol">=</div>
        <div class="btn btn-primary">C</div>
      </div>
      <div class="row">
        <div class="btn btn-default">7</div>
        <div class="btn btn-default">8</div>
        <div class="btn btn-default">9</div>
        <div class="btn btn-primary symbol">÷</div>
      </div>
      <div class="row">
        <div class="btn btn-default">4</div>
        <div class="btn btn-default">5</div>
        <div class="btn btn-default">6</div>
        <div class="btn btn-primary symbol" data-symbol="*">&times;</div>
      </div>
      <div class="row">
        <div class="btn btn-default">1</div>
        <div class="btn btn-default">2</div>
        <div class="btn btn-default">3</div>
        <div class="btn btn-primary symbol">-</div>
      </div>
      <div class="row">
        <div class="btn btn-default">0</div>
        <div class="btn btn-warning" data-symbol=" ">W <sup>x</sup>&frasl;<sub>y</sub></div>
        <div class="btn btn-warning" data-symbol="/"><sup>x</sup>&frasl;<sub>y</sub></div>
        <div class="btn btn-primary symbol">+</div>
      </div>

      <div class="credit">By <a href="https://github.com/jordao76">Jordão</a>. Check it out on <a href="https://github.com/jordao76/fractions">GitHub</a>.</div>

    </div>

  </body>
</html>
